<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0" />
  <meta name="theme-color" content="#000000" />
  <script src="/.well-known/service/api/env"></script>
  <script src="/__blocklet__.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <noscript> You need to enable JavaScript to run this app. </noscript>
  <div id="app">
    <style>
      body,
      html,
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 0;
      }

      .spinner-wrapper {
        width: 70px;
        opacity: 0;
        animation-name: fadeIn;
        animation-duration: 500ms;
        animation-timing-function: ease;
        animation-iteration-count: 1;
        animation-delay: 500ms;
        animation-fill-mode: forwards;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .spinner {
        width: 70px;
        text-align: center;
        --bg-color: transparent;
      }

      .spinner>div {
        width: 18px;
        height: 18px;
        background-color: var(--bg-color);

        border-radius: 100%;
        display: inline-block;
        -webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
        animation: sk-bouncedelay 1.4s infinite ease-in-out both;
      }

      .spinner .bounce1 {
        -webkit-animation-delay: -0.32s;
        animation-delay: -0.32s;
      }

      .spinner .bounce2 {
        -webkit-animation-delay: -0.16s;
        animation-delay: -0.16s;
      }

      #loadingImage {
        margin-bottom: 16px;
        object-fit: contain;
      }

      @-webkit-keyframes fadeIn {
        0% {
          opacity: 0;
        }

        100% {
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }

        100% {
          opacity: 1;
        }
      }

      @-webkit-keyframes sk-bouncedelay {

        0%,
        80%,
        100% {
          -webkit-transform: scale(0);
        }

        40% {
          -webkit-transform: scale(1);
        }
      }

      @keyframes sk-bouncedelay {

        0%,
        80%,
        100% {
          -webkit-transform: scale(0);
          transform: scale(0);
        }

        40% {
          -webkit-transform: scale(1);
          transform: scale(1);
        }
      }
    </style>
    <div class="spinner-wrapper">
      <img id="loadingImage" width="70" height="70" style="object-fit: contain;" />
      <div id="spinner" class="spinner">
        <div class="bounce1"></div>
        <div class="bounce2"></div>
        <div class="bounce3"></div>
      </div>
    </div>
    <script>
      (() => {
        const loadingImage = document.getElementById('loadingImage');
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const spinner = document.getElementById('spinner');
        if (spinner && window?.blocklet) {
          const color = isDark ? window.blocklet?.theme?.dark?.palette?.primary?.main : window.blocklet?.theme?.light?.palette?.primary?.main;
          if (color) {
            spinner.style.setProperty("--bg-color", color);
          }
        }

        let logo = "/.well-known/service/blocklet/logo?imageFilter=convert&f=png&w=80";

        if (window?.blocklet) {
          const { appLogo, appLogoDark } = window.blocklet;
          if (appLogo) {
            logo = isDark && appLogoDark ? appLogoDark : appLogo;
          }
        }

        loadingImage.src = logo;
      })();
    </script>
  </div>
  <script type="module" src="/src/index.jsx"></script>
</body>

</html>
