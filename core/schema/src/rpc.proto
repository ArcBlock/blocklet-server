syntax = "proto3";
package abt_node;

import "enum.proto";
import "type.proto";
import "google/protobuf/any.proto";

message EmptyRequest {}

message GeneralResponse {
  StatusCode code = 1;
}

message BooleanResponse {
  StatusCode code = 1;
  bool result = 2;
}

message RequestBlocklet {
  string did = 1;
}

message RequestComponents {
  string did = 1;
  repeated string component_dids = 2;
}

message RequestBlockletDetail {
  string did = 1;
  bool attach_disk_info = 2;
  bool attach_runtime_info = 3;
  bool get_optional_components = 4;
  string domain = 5;
  bool use_cache = 6;
}

message ResponseBlocklet {
  StatusCode code = 1;
  BlockletState blocklet = 2;
}

message RequestBlockletMetaFromUrl {
  string url = 1;
  bool check_price = 2;
}

message ResponseBlockletMetaFromUrl {
  StatusCode code = 1;
