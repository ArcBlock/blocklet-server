}
message ResponseGetBlocklets {
  StatusCode code = 1;
  repeated BlockletState blocklets = 2;
  Paging paging = 3;
}
message ResponseBlockletsFromBackup {
  StatusCode code = 1;
  repeated BlockletBackupState backups = 2;
}


message RequestGetNodeInfo {}
message ResponseGetNodeInfo {
  StatusCode code = 1;
  NodeState info = 2;
}
message ResponseGetNodeEnv {
  StatusCode code = 1;
  NodeEnvInfo info = 2;
}
message RequestResetNode {
  bool owner = 1;
  bool blocklets = 2;
  bool webhooks = 3;
  bool certificates = 4;
  bool access_keys = 5;
  bool blocklet_extras = 6;
  bool routing_rules = 7;
  bool users = 8;
  bool invitations = 9;
}
