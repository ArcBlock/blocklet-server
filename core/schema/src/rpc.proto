}

message RequestDelegationState{}
message ResponseDelegationState{
  StatusCode code = 1;
  DelegationState state = 2;
}

message RequestConfigBlocklet {
  repeated string did = 1;
  repeated ConfigEntry configs = 2;
}

// blocklet installation params
message RequestInstallBlocklet {
  string type = 12; // store, url, upload, create, restore

  // install from Store
  string did = 1;
  string store_url = 11;

  // install from Url or Backup
  string url = 2;

  // install from Upload
  Upload file = 3;
  string diff_version = 4;
  repeated string delete_set = 5;

  // install from custom creation
  string title = 6;
  string description = 7;

  bool start_immediately = 8;

  // optional for all types
  string app_sk = 9;

  // paid blocklet related
  repeated DownloadToken download_token_list = 10;
}

message RequestInstallComponent {
  string root_did = 1;
  string mount_point = 2;
  string url = 3;

  // install from Upload
  Upload file = 4;
  string did = 5;
  string diff_version = 6;
  repeated string delete_set = 7;

  // custom component id and info
  string name = 8;
  string title = 9;

  // configs
  repeated ConfigEntry configs = 10;

  // paid blocklet related
  repeated DownloadToken download_token_list = 12;

  // deprecated
  bool skip_navigation = 13;
  bool only_required = 14;

  // deploy support dist
  BlockletDist dist = 15;
}

message ResponseCheckComponentsForUpdates {
  StatusCode code = 1;
  BlockletPreUpdateInfo pre_update_info = 2;
