  bool in_store = 6;
  string registry_url = 7;
}

message RequestBlockletDiff {
  string did = 1;
  repeated HashFile hash_files = 2;
  string root_did = 3;
}
message ResponseBlockletDiff {
  StatusCode code = 1;
  BlockletDiff blocklet_diff = 2;
}

message RequestGetBlocklets {
  bool use_cache = 1;
  BlockletQuery query = 2;
  bool include_runtime_info = 3;
  Paging paging = 4;
  string search = 5;
  bool external = 6;
